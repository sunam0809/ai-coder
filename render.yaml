services:
  - type: web
    name: ai-coder-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: ai-coder-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/ai-coder run build
    staticPublishPath: artifacts/ai-coder/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 3000
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ai-coder-api.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
